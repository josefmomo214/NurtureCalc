name: CI - Build Verification for NurtureCalc

on:
  push:
    branches:
      - main

jobs:
  build-verification:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Project
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -d "./out/_next" ]; then
            echo "Build failed - out/_next directory not found"
            exit 1
          fi
          echo "Build verified - out/_next exists"
